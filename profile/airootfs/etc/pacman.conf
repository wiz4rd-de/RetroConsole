#
# /etc/pacman.conf — RetroConsole
# Based on the archiso releng pacman.conf, plus the local [retroconsole]
# repository holding AUR packages built during the ISO build.
#

[options]
HoldPkg     = pacman glibc
Architecture = auto
ParallelDownloads = 5
SigLevel    = Required DatabaseOptional
LocalFileSigLevel = Optional

[core]
Include = /etc/pacman.d/mirrorlist

[extra]
Include = /etc/pacman.d/mirrorlist

# AUR packages (emulationstation-de, game-devices-udev,
# retroarch-autoconfig-udev-git) built by scripts/build-aur-repo.sh.
# The same path exists in the build container (symlink) and on the
# installed system (shipped in the image), so one config works everywhere.
# MVP: unsigned local repo. Sign before distributing publicly.
[retroconsole]
SigLevel = Optional TrustAll
Server = file:///opt/retroconsole/repo
