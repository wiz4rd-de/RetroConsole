#
# /etc/pacman.conf — RetroConsole
# Based on the archiso releng pacman.conf, plus the local [retroconsole]
# repository holding AUR packages built during the ISO build.
#

[options]
HoldPkg     = pacman glibc
Architecture = auto
ParallelDownloads = 5
SigLevel    = Required DatabaseOptional
LocalFileSigLevel = Optional

[core]
Include = /etc/pacman.d/mirrorlist

[extra]
Include = /etc/pacman.d/mirrorlist

# RetroConsole's own packages: retroconsole-config plus the AUR builds
# (emulationstation-de, game-devices-udev, retroarch-autoconfig-udev-git),
# built by scripts/build-aur-repo.sh.
# The GitHub Releases server is published by scripts/publish-repo.sh and
# delivers fixes to installed systems ("Update System" / pacman -Syu).
# The file:// copy is baked into the image as an offline fallback.
# MVP: unsigned repo over HTTPS. Sign before distributing publicly.
[retroconsole]
SigLevel = Optional TrustAll
Server = https://github.com/wiz4rd-de/RetroConsole/releases/download/repo
Server = file:///opt/retroconsole/repo
