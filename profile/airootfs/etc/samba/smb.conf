[global]
   workgroup = WORKGROUP
   server string = RetroConsole
   server role = standalone server
   map to guest = Bad User
   guest account = retro
   security = user
   server min protocol = SMB2
   load printers = no
   printing = bsd
   printcap name = /dev/null
   disable spoolss = yes

[ROMs]
   path = /home/retro/ROMs
   comment = RetroConsole ROMs
   browseable = yes
   writable = yes
   guest ok = yes
   guest only = yes
   force user = retro
   ; Guest sessions are access-checked against the NT ACL synthesized from
   ; the POSIX mode, not the forced user, so the ROM dirs ship 0777 and
   ; everything created over the share stays world-writable too.
   create mask = 0666
   directory mask = 0777
   ; tools/ is executed by ES-DE — keep it off the share so network guests
   ; cannot tamper with it. The rest are macOS/Windows sidecar junk that
   ; would otherwise show up in ES-DE gamelists (e.g. "._game.nes").
   veto files = /tools/._*/.DS_Store/.Trashes/.TemporaryItems/Thumbs.db/desktop.ini/
   delete veto files = yes
