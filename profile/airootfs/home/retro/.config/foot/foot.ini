# foot terminal config for the RetroConsole kiosk.
# The tools that open foot (Update System, Wi-Fi Setup) are meant to be read
# from across a room on a TV, so use a large bitmap font. Terminus is the only
# font shipped in the image (terminus-font); it has crisp fixed bitmap sizes.
# size=20 stays legible at couch distance on 1080p and up.
[main]
font=Terminus:size=20
pad=24x24
