menu_driver = "ozone"
video_fullscreen = "true"
# Audio-clock baseline. RetroArch times audio against video_refresh_rate (it
# assumes 60Hz); the field T630 drives a European 1080p@50 (PAL) panel, and the
# 50-vs-60 mismatch drifts the audio buffer dry -> the buzz/stutter diagnosed in
# #13 (audio_driver/audio_latency were ruled out there as red herrings). The
# in-session launcher (retroconsole-launch) overrides this each boot with the
# refresh cage is actually driving, so it adapts to any panel; this shipped value
# is the fallback used when no refresh can be read (#14).
video_refresh_rate = "50"
pause_nonactive = "false"
quit_press_twice = "false"
input_quit_gamepad_combo = "4"
# Controller path to the in-game RetroArch menu (M11/#18): Down+Select opens it,
# so a player can reach Quick Menu -> Shaders (and every other tweak) without a
# keyboard. "9" = INPUT_COMBO_DOWN_SELECT in the enum input_combo_type backing
# input_menu_toggle_gamepad_combo (retroarch 1.22.2, input/input_defines.h:
# ... HOLD_START=7, HOLD_SELECT=8, DOWN_SELECT=9, L2_R2=10). A pre-HOLD_SELECT
# RetroArch shifts Down+Select to 8 -- re-pin both here and in retroconsole-seed
# if the shipped retroarch is ever downgraded. Like the quit combo this must live
# in the shipped file: RetroArch honors the FIRST occurrence and re-saves the
# whole config on exit, so the value persists across resaves. Start+Select quit
# (the "4" above, verified in M3) is intentionally left untouched.
input_menu_toggle_gamepad_combo = "9"
# Point at the retroarch-autoconfig-udev profiles; RetroArch's built-in
# default is the (empty) per-user dir, which leaves every pad unmapped
# ("not configured", so no Select+Start quit combo either). Must live in
# this shipped file: RetroArch honors the FIRST occurrence and re-saves
# the full config on exit, so the value persists across resaves.
joypad_autoconfig_dir = "/usr/share/libretro/autoconfig"
input_autodetect_enable = "true"
savestate_auto_index = "true"
menu_show_quit_retroarch = "true"
# Point Quick Menu -> Shaders -> "Load Shader Preset" at the bundled pack
# (libretro-shaders-glsl/-slang, installed to /usr/share/libretro/shaders/ with
# shaders_glsl/ and shaders_slang/ subdirs). RetroArch's default browse dir is the
# empty per-user ~/.config/retroarch/shaders, so without this the menu looks empty
# until a player runs the Online Updater — they should NOT have to. Managed by
# retroconsole-seed so OTA boxes get it too (RetroArch re-saves the whole cfg on
# exit; the seed forces the key every run).
video_shader_dir = "/usr/share/libretro/shaders/"
