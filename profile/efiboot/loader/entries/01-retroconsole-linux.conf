title    Install RetroConsole (%ARCH%, UEFI)
sort-key 01
linux    /%INSTALL_DIR%/boot/%ARCH%/vmlinuz-linux
initrd   /%INSTALL_DIR%/boot/%ARCH%/initramfs-linux.img
# nomodeset: the installer is text-only; stay on the firmware framebuffer.
# A native-driver modeset can pick a mode/connector the TV cannot display.
# copytoram=n: archiso auto-copies the squashfs to RAM on non-optical boot
# media and then unmounts them — but the installer reads the squashfs and
# kernel from the mounted medium.
options  archisobasedir=%INSTALL_DIR% archisosearchuuid=%ARCHISO_UUID% nomodeset copytoram=n
