#
# Build-time pacman.conf — RetroConsole
# Used by mkarchiso/pacstrap inside the build container. The system's own
# pacman.conf is airootfs/etc/pacman.conf (same repos, but with the download
# sandbox kept enabled — seccomp does not work under Rosetta emulation).
#

[options]
DisableSandbox
HoldPkg     = pacman glibc
Architecture = auto
ParallelDownloads = 5
SigLevel    = Required DatabaseOptional
LocalFileSigLevel = Optional

[core]
Include = /etc/pacman.d/mirrorlist

[extra]
Include = /etc/pacman.d/mirrorlist

# AUR packages (emulationstation-de, game-devices-udev,
# retroarch-autoconfig-udev-git) built by scripts/build-aur-repo.sh.
# The same path exists in the build container (symlink) and on the
# installed system (shipped in the image), so one config works everywhere.
# MVP: unsigned local repo. Sign before distributing publicly.
[retroconsole]
SigLevel = Optional TrustAll
Server = file:///opt/retroconsole/repo
