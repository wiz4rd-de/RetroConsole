LABEL retroconsole
TEXT HELP
Boot the RetroConsole installer (BIOS).
Careful: installing wipes the internal drive.
ENDTEXT
MENU LABEL Install RetroConsole (%ARCH%, BIOS)
LINUX /%INSTALL_DIR%/boot/%ARCH%/vmlinuz-linux
INITRD /%INSTALL_DIR%/boot/%ARCH%/initramfs-linux.img
APPEND archisobasedir=%INSTALL_DIR% archisosearchuuid=%ARCHISO_UUID%

LABEL retroconsole-live
TEXT HELP
Try RetroConsole without installing: boots the ES-DE
kiosk session straight from the USB stick.
ENDTEXT
MENU LABEL Live session - try without installing (%ARCH%, BIOS)
LINUX /%INSTALL_DIR%/boot/%ARCH%/vmlinuz-linux
INITRD /%INSTALL_DIR%/boot/%ARCH%/initramfs-linux.img
APPEND archisobasedir=%INSTALL_DIR% archisosearchuuid=%ARCHISO_UUID% retroconsole.session

LABEL retroconsole-live-soft
TEXT HELP
Live session with software rendering, for GPUs the
default GLES renderer cannot drive (and for VMs).
ENDTEXT
MENU LABEL Live session, safe graphics (%ARCH%, BIOS)
LINUX /%INSTALL_DIR%/boot/%ARCH%/vmlinuz-linux
INITRD /%INSTALL_DIR%/boot/%ARCH%/initramfs-linux.img
APPEND archisobasedir=%INSTALL_DIR% archisosearchuuid=%ARCHISO_UUID% retroconsole.session retroconsole.software
