LABEL retroconsole
TEXT HELP
Boot the RetroConsole installer (BIOS).
Careful: installing wipes the internal drive.
ENDTEXT
MENU LABEL Install RetroConsole (%ARCH%, BIOS)
LINUX /%INSTALL_DIR%/boot/%ARCH%/vmlinuz-linux
INITRD /%INSTALL_DIR%/boot/%ARCH%/initramfs-linux.img
APPEND archisobasedir=%INSTALL_DIR% archisosearchuuid=%ARCHISO_UUID%
