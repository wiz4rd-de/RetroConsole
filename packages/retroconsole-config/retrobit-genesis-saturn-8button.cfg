# RetroConsole — Retro-Bit / 8BitDo-M30-class Sega 8-button pad (the
# "Sega-lookalike", DragonRise 0079:0011, OEM USB string "SWITCH CO.,LTD.").
#
# Why this ships here instead of an airootfs override: RetroArch loads autoconfig
# profiles from retroarch-autoconfig-udev-git, and several of them match VID
# 0x0079 by id ALONE, so its score-based matcher picked the wrong one for this
# pad (#46/#47) — wrong face buttons in every identity. This profile outscores an
# id-only match by also matching the device NAME exactly, so it always wins.
#
# DO NOT "tidy" the trailing space in input_device: the USB product string is
# literally "SWITCH CO.,LTD. USB Gamepad " (note the trailing space). Drop it and
# the exact-name match breaks and the wrong shipped profile wins again.
#
# Mapping: Sega 6-button (bottom A B C / top X Y Z, no shoulders) -> RetroPad per
# the Genesis convention A->Y B->B C->A / X->L Y->X Z->R, Start->Start,
# Mode->Select. D-pad is on the analog axes (0/1), not a HAT. Captured verbatim
# from RetroArch "Save Controller Profile" on the hardware (#47); cold-boot
# enumeration determinism (the dead-d-pad "pro controller" identity) is out of
# scope here by design.
input_driver = "udev"
input_device_display_name = "Retro-bit Genesis/Saturn 8 Button Arcade Pad"
input_b_btn = "2"
input_y_btn = "1"
input_select_btn = "8"
input_start_btn = "9"
input_up_axis = "-1"
input_down_axis = "+1"
input_left_axis = "-0"
input_right_axis = "+0"
input_a_btn = "4"
input_x_btn = "3"
input_l_btn = "0"
input_r_btn = "5"
input_b_btn_label = "B"
input_a_btn_label = "C"
input_y_btn_label = "A"
input_l_btn_label = "X"
input_x_btn_label = "Y"
input_r_btn_label = "Z"
input_l2_btn_label = "L"
input_r2_btn_label = "R"
input_up_axis_label = "D-Pad Up"
input_down_axis_label = "D-Pad Down"
input_left_axis_label = "D-Pad Left"
input_right_axis_label = "D-Pad Right"
input_start_btn_label = "Start"
input_select_btn_label = "Mode"
input_device = "SWITCH CO.,LTD. USB Gamepad "
input_vendor_id = "121"
input_product_id = "17"
