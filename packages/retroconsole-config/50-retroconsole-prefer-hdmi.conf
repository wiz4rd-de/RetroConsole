# RetroConsole: audio session defaults — prefer HDMI/DisplayPort output and
# start the default sink at full volume.
#
# WirePlumber's stock priorities rank analog sinks (internal speakers,
# line-out) above HDMI, so on real hardware sound comes out of the PC
# instead of the TV. This box lives behind a TV: rank digital display
# audio highest so it becomes the default sink whenever it exists.
# (Stock priorities: analog ~1009, HDMI ~500-900.)
monitor.alsa.rules = [
  {
    matches = [
      { node.name = "~alsa_output.*hdmi.*" }
    ]
    actions = {
      update-props = {
        priority.session = 1500
        priority.driver  = 1500
      }
    }
  }
]

# Default route volume. WirePlumber 0.5 initializes a new sink route at 40%
# (device.routes.default-sink-volume = 0.4), so a freshly imaged box is quiet
# out of the box (#13). Raise the default to 100%; retroconsole-launch also
# re-asserts this each session start via wpctl, which fixes already-booted
# boxes whose 40% was persisted to user state.
wireplumber.settings = {
  device.routes.default-sink-volume = 1.0
}
