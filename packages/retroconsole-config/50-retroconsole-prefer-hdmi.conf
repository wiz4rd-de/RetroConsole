# RetroConsole: prefer HDMI/DisplayPort audio over analog outputs.
#
# WirePlumber's stock priorities rank analog sinks (internal speakers,
# line-out) above HDMI, so on real hardware sound comes out of the PC
# instead of the TV. This box lives behind a TV: rank digital display
# audio highest so it becomes the default sink whenever it exists.
# (Stock priorities: analog ~1009, HDMI ~500-900.)
monitor.alsa.rules = [
  {
    matches = [
      { node.name = "~alsa_output.*hdmi.*" }
    ]
    actions = {
      update-props = {
        priority.session = 1500
        priority.driver  = 1500
      }
    }
  }
]
