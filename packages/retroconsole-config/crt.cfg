# RetroConsole — CRT shader enable overlay (M11/#20).
#
# Layered onto the running retroarch.cfg via `--appendconfig` ONLY when a game is
# launched through the ES-DE "RetroArch — CRT" alternative emulator (see
# es_systems.xml). The normal launch path (no --appendconfig) is byte-for-byte
# unchanged — no regression for players who don't pick CRT.
#
# This overlay sets EXACTLY ONE key: video_shader_enable. It does NOT select the
# preset — the ES-DE CRT command does that with `--set-shader <path-to.glslp>`.
# Why the split: RetroArch decides which shader to load at content start ONLY from
# the --set-shader CLI value (or an on-disk automatic preset); it does NOT read a
# `video_shader` config key. That key was removed from RetroArch in 1.7.8 and is
# silently ignored in any config file or --appendconfig overlay — so the original
# `video_shader = ".../zfast-crt.glslp"` line here loaded nothing (the bug). It has
# been removed.
#
# video_shader_enable is still required: the shader selector
# (video_shader_get_current_shader_preset) returns early with no shader when it is
# false, and DEFAULT_SHADER_ENABLE is false on a Linux (non-console) build. Carrying
# it here — appended only for the CRT launch — keeps the default emulator's shader
# subsystem off while letting --set-shader take effect for the CRT entry.
#
# Preset (selected via --set-shader in es_systems.xml): zfast-crt (glsl). Single
# render pass, one texture fetch, no sin/cos/pow — purpose-built to hold 60fps at
# 1080p on hardware weaker than the field T630's GX-420GI (GCN 1.x, the realistic
# low-water-mark GPU), so the shipped default never drops frames under live
# emulation. crt-easymode (also in shaders_glsl/crt/) looks nicer but is ~8x the
# per-pixel cost; a player whose GPU can afford it switches live via Quick Menu ->
# Shaders for the session.
#
# Shipped READ-ONLY at a system path (/usr/share/retroconsole/retroarch/), NOT
# under /home: RetroArch never rewrites an --appendconfig overlay, and keeping it
# off the user partition means OTA updates replace it cleanly and it is never
# reconciled into the user's mutable retroarch.cfg.
video_shader_enable = "true"
