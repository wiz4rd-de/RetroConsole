# RetroConsole — CRT shader overlay (M11/#20).
#
# Layered onto the running retroarch.cfg via `--appendconfig` ONLY when a game is
# launched through the ES-DE "RetroArch — CRT" alternative emulator (see
# es_systems.xml). It sets just the two shader keys, so the normal launch path
# (no --appendconfig) is byte-for-byte unchanged — no regression for players who
# don't pick CRT.
#
# Shipped READ-ONLY at a system path (/usr/share/retroconsole/retroarch/), NOT
# under /home: RetroArch never rewrites an --appendconfig overlay, and keeping it
# off the user partition means OTA updates replace it cleanly and it is never
# reconciled into the user's mutable retroarch.cfg.
#
# Preset: zfast-crt (glsl). Single render pass, one texture fetch, no sin/cos/pow
# — purpose-built to hold 60fps at 1080p on hardware weaker than the field T630's
# GX-420GI (GCN 1.x, the realistic low-water-mark GPU), so the shipped default
# never drops frames under live emulation. crt-easymode (also in shaders_glsl/crt/)
# looks nicer but is ~8x the per-pixel cost; a player whose GPU can afford it
# switches via Quick Menu -> Shaders, and a per-game preset saved there auto-loads
# AHEAD of this overlay and persists on the rcuser partition (RetroArch override
# precedence — nothing to configure here).
#
# The path below must match libretro-shaders-glsl's install tree exactly (M11/#19);
# the two move together.
video_shader_enable = "true"
video_shader = "/usr/share/libretro/shaders/shaders_glsl/crt/zfast-crt.glslp"
